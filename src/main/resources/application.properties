spring.application.name=ai-personal-knowledge-assistant

server.port=8081

# =========================
# MySQL
# =========================

spring.datasource.url=jdbc:mysql://localhost:3306/ai_personal_assistant

spring.datasource.username=root

spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

# =========================
# Upload
# =========================

spring.servlet.multipart.max-file-size=20MB

spring.servlet.multipart.max-request-size=20MB

# =========================
# Ollama
# =========================

spring.ai.ollama.base-url=http://localhost:11434

spring.ai.ollama.chat.options.model=llama3.2:1b

spring.ai.ollama.embedding.options.model=all-minilm

# =========================
# ChromaDB
# =========================

spring.ai.vectorstore.chroma.client.host=localhost

spring.ai.vectorstore.chroma.client.port=8000

spring.ai.vectorstore.chroma.initialize-schema=false

spring.ai.vectorstore.chroma.collection-name=documents