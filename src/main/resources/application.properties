spring.application.name=ai-personal-knowledge-assistant

server.port=8081

# =========================
# MySQL
# =========================

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3305}/ai_personal_assistant

spring.datasource.username=${DB_USERNAME:root}

spring.datasource.password=${DB_PASSWORD:root}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =========================
# Upload
# =========================

spring.servlet.multipart.max-file-size=20MB

spring.servlet.multipart.max-request-size=20MB

# =========================
# Ollama
# =========================

spring.ai.ollama.base-url=${OLLAMA_HOST:http://localhost:11434}

spring.ai.ollama.chat.options.model=${OLLAMA_CHAT_MODEL:llama3.2:1b}

spring.ai.ollama.embedding.options.model=${OLLAMA_EMBEDDING_MODEL:all-minilm}

# =========================
# ChromaDB Vector Store
# =========================

spring.ai.vectorstore.chroma.client.host=${CHROMA_HOST:http://localhost}

spring.ai.vectorstore.chroma.client.port=${CHROMA_PORT:8000}

spring.ai.vectorstore.chroma.collection-name=documents

# =========================
# Logging
# =========================

logging.level.com.example.aipersonalassistant=INFO

logging.level.org.springframework.ai=WARN

logging.level.org.hibernate.SQL=WARN
